services:
  - type: web
    name: careerpilot-ai-api
    runtime: python
    rootDir: backend
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: MODEL_NAME
        value: gpt-4o-mini
      - key: LLM_TIMEOUT_SECONDS
        value: "25"
      - key: LLM_MAX_RETRIES
        value: "1"
      - key: EMBEDDING_PROVIDER
        value: hash
      - key: CHROMA_PATH
        value: database/chroma

  - type: web
    name: careerpilot-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: VITE_API_BASE_URL
        value: https://careerpilot-ai-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
